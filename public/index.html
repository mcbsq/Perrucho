<!DOCTYPE html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8" />

    <!-- ── Favicon / iconos ── -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- ── Viewport / tema ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#185FA5" />

    <!-- ── SEO básico ── -->
    <title>Taylor's Pet Services | Grooming, tienda y guardería para tu mascota</title>
    <meta
      name="description"
      content="Taylor's Pet Services en Lindavista, CDMX: grooming, baño y corte, tienda y guardería para perros y gatos. Agenda tu cita en minutos."
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Taylor's Pet Services" />
    <link rel="canonical" href="https://perrucho.vercel.app/" />

    <!-- ── Open Graph (WhatsApp, Facebook, etc.) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Taylor's Pet Services" />
    <meta property="og:title" content="Taylor's Pet Services | Grooming, tienda y guardería" />
    <meta
      property="og:description"
      content="Grooming, baño y corte, tienda y guardería para tu mascota. Agenda tu cita en minutos."
    />
    <meta property="og:image" content="%PUBLIC_URL%/logo.png" />
    <meta property="og:url" content="https://perrucho.vercel.app/" />
    <meta property="og:locale" content="es_MX" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Taylor's Pet Services" />
    <meta
      name="twitter:description"
      content="Grooming, baño y corte, tienda y guardería para tu mascota. Agenda tu cita en minutos."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo.png" />

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.
    -->
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para usar esta aplicación.</noscript>
    <div id="root"></div>
  </body>
</html>
